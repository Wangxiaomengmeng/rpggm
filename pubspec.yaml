name: rpg_game
description: 超肝联机RPG游戏

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  provider: ^6.1.1
  # Firebase联机核心
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  # 弹窗提示
  fluttertoast: ^8.2.5
  # 路由
  go_router: ^12.1.3
  # 动画/UI
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true